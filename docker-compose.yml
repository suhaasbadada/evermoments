version: "3.9"

services:
  api:
    build:
      context: ./apps/api
    env_file:
      - ./apps/api/.env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/app:/app/app

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api
