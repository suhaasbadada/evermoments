[pytest]
# Two-tier test strategy (Slice 8d):
#   Tier 1 (default): free, offline, LocalStore — runs on every `pytest` invocation.
#   Tier 2 (gated):   real cognee + OpenAI, costs money — marked `cognee`, DESELECTED here.
# `addopts` deselects the marker by default; a command-line `-m` overrides it, so
# `pytest -m cognee` still runs ONLY the Tier 2 suite.
markers =
    cognee: Tier 2 — hits real cognee + OpenAI (costs money, needs keys). Deselected by default; run with `pytest -m cognee`.
addopts = -m "not cognee"
testpaths = app
filterwarnings =
    # Upstream: starlette's TestClient uses httpx; deprecation is not actionable here.
    ignore:Using .httpx. with .starlette.testclient. is deprecated
